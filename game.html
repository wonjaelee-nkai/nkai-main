// ═══════════════════════════════════════════════
// ─── KaiBoom Analytics Engine (서버 수집 + 로컬) ───
// ═══════════════════════════════════════════════
// ★ GAS 배포 후 아래 URL 교체 필수!
const KB_GAS_URL = "https://script.google.com/macros/s/AKfycbzzDGGrT_DR0qtMWVyfL6YHId9doaHzubs3RWeBcVDhudZQ3udmhzBFa9o_q7I95ofu/exec";

const KBAnalytics = (function(){
  const STORAGE_KEY = "nkai_kb_analytics";
  // ─── 익명 유저 ID (디바이스별 고유) ───
  let uid = localStorage.getItem("nkai_uid");
  if (!uid) { uid = 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); localStorage.setItem("nkai_uid", uid); }

  // ─── 서버 전송 (fire-and-forget) ───
  const sendQueue = [];
  let sending = false;
  function sendToServer(eventType, payload) {
    const row = {
      uid, ts: new Date().toISOString(),
      event: eventType,
      screen: currentScreen || '',
      ...payload,
      ua: navigator.userAgent.slice(0,120),
      lang: navigator.language || 'ko',
      ref: document.referrer.slice(0,200),
    };
    sendQueue.push(row);
    flushQueue();
  }
  function flushQueue() {
    if (sending || sendQueue.length === 0) return;
    if (KB_GAS_URL.includes('YOUR_DEPLOYMENT')) return; // GAS 미배포 시 스킵
    sending = true;
    const batch = sendQueue.splice(0, 20); // 최대 20개씩
    const url = KB_GAS_URL + '?sheet=KaiBoom_Events';
    fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify(batch),
    }).catch(()=>{}).finally(()=>{
      sending = false;
      if (sendQueue.length > 0) setTimeout(flushQueue, 1000);
    });
  }
  // 페이지 떠날 때 남은 큐 전송
  window.addEventListener('beforeunload', ()=>{
    if (sendQueue.length > 0 && !KB_GAS_URL.includes('YOUR_DEPLOYMENT')) {
      navigator.sendBeacon(KB_GAS_URL + '?sheet=KaiBoom_Events', JSON.stringify(sendQueue));
    }
  });

  // ─── 로컬 저장 (개인 대시보드용) ───
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {
    firstVisit: new Date().toISOString(),
    totalSessions: 0,
    screens: {},
    clicks: {},
    funnels: {},
    modes: {solo:0, bossRush:0, chemistry:0, tutorial:0},
    features: {zodiacSet:0, archetypeSet:0, archetypeChanges:0, shareClicks:0, nkaiCTA:0, missionClicks:0, selfReport:0, leaderboardViews:0, fortuneViews:0},
    retention: {},
    peakHours: {},
    dailyActive: [],
    conversions: {menuToPlay:0, playToResult:0, resultToNKAI:0, archetypeToNKAI:0, bossDefeatToNKAI:0},
  };

  let screenEnterTime = Date.now();
  let currentScreen = "menu";
  let sessionStart = Date.now();

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  // Session init
  function initSession() {
    const today = new Date().toISOString().slice(0,10);
    const hour = new Date().getHours().toString();
    data.totalSessions++;
    data.peakHours[hour] = (data.peakHours[hour]||0) + 1;
    if (!data.retention[today]) data.retention[today] = {visits:0, plays:0};
    data.retention[today].visits++;
    if (!data.dailyActive.includes(today)) {
      data.dailyActive.push(today);
      if (data.dailyActive.length > 30) data.dailyActive.shift();
    }
    save();
    sendToServer('session_start', {hour, today});
  }

  function screenView(name) {
    const now = Date.now();
    const dwellMs = now - screenEnterTime;
    if (currentScreen) {
      if (!data.screens[currentScreen]) data.screens[currentScreen] = {views:0, totalMs:0};
      data.screens[currentScreen].totalMs += dwellMs;
      // 화면 이탈 시 체류시간 전송 (2초 이상만)
      if (dwellMs > 2000) sendToServer('screen_dwell', {screen: currentScreen, dwell_sec: Math.round(dwellMs/1000)});
    }
    currentScreen = name;
    screenEnterTime = now;
    if (!data.screens[name]) data.screens[name] = {views:0, totalMs:0};
    data.screens[name].views++;
    save();
    sendToServer('screen_view', {screen: name});
  }

  function click(buttonId) {
    if (!data.clicks[buttonId]) data.clicks[buttonId] = {count:0, firstAt:new Date().toISOString()};
    data.clicks[buttonId].count++;
    data.clicks[buttonId].lastAt = new Date().toISOString();
    save();
    sendToServer('click', {button: buttonId});
  }

  function gameStart(mode) {
    if (data.modes[mode] !== undefined) data.modes[mode]++;
    const today = new Date().toISOString().slice(0,10);
    if (data.retention[today]) data.retention[today].plays++;
    data.conversions.menuToPlay++;
    save();
    sendToServer('game_start', {mode, zodiac: playerZodiac?.name||'', archetype: playerArchetype?.code||''});
  }

  function gameEnd(mode, score, combo, duration) {
    data.conversions.playToResult++;
    save();
    sendToServer('game_end', {mode, score, max_combo: combo, duration_sec: duration});
  }

  function feature(name) {
    if (data.features[name] !== undefined) data.features[name]++;
    save();
    sendToServer('feature', {name});
  }

  function conversion(name) {
    if (data.conversions[name] !== undefined) data.conversions[name]++;
    save();
    sendToServer('conversion', {funnel: name});
  }

  // Get summary for display
  function getSummary() {
    const totalPlays = Object.values(data.modes).reduce((a,b)=>a+b,0);
    const dau = data.dailyActive.length;
    const avgSession = data.totalSessions > 0 ? Math.round(Object.values(data.screens).reduce((a,s)=>a+s.totalMs,0) / data.totalSessions / 1000) : 0;

    const screenRank = Object.entries(data.screens)
      .map(([k,v])=>({name:k, views:v.views, avgSec: v.views>0?Math.round(v.totalMs/v.views/1000):0}))
      .sort((a,b)=>b.views-a.views);

    const clickRank = Object.entries(data.clicks)
      .map(([k,v])=>({name:k, count:v.count}))
      .sort((a,b)=>b.count-a.count);

    // Peak hour
    const peakHour = Object.entries(data.peakHours).sort((a,b)=>b[1]-a[1])[0];

    // Funnel conversion rates
    const funnelRates = {
      menuToPlay: data.conversions.menuToPlay,
      playToResult: data.conversions.playToResult,
      resultToNKAI: data.conversions.resultToNKAI,
      playToNKAI: data.conversions.menuToPlay > 0 ? Math.round(data.conversions.resultToNKAI / data.conversions.menuToPlay * 100) : 0,
    };

    return { ...data, totalPlays, dau, avgSession, screenRank, clickRank, peakHour, funnelRates };
  }

  function reset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

  initSession();
  return { screenView, click, gameStart, feature, conversion, getSummary, reset, data };
})();

function getZodiac(birthday) {
  if (!birthday) return null;
  const parts = birthday.split("-");
  let year = parseInt(parts[0]);
  const month = parseInt(parts[1]);
  const day = parseInt(parts[2]);
  // 입춘 기준: 양력 2월 4일 전이면 전년도 띠
  if (month < 2 || (month === 2 && day < 4)) year -= 1;
  return ZODIAC[(year - 4) % 12];
}

// ─── Helpers ───
const rand = () => Math.floor(Math.random() * ELEMENTS.length);
const $ = id => document.getElementById(id);
const cellSize = () => Math.min(52, (Math.min(window.innerWidth, 440) - 48) / BOARD_SIZE);

function createBoard() {
  let b, a = 0;
  do {
    b = Array.from({length:BOARD_SIZE}, () => Array.from({length:BOARD_SIZE}, () => rand()));
    a++;
  } while (findMatches(b).length > 0 && a < 100);
  return b;
}

function findMatches(b) {
  const m = new Set();
  for (let r=0;r<BOARD_SIZE;r++) for (let c=0;c<BOARD_SIZE-2;c++) {
    if (b[r][c]!==-1&&b[r][c]===b[r][c+1]&&b[r][c]===b[r][c+2]) {
      m.add(`${r},${c}`);m.add(`${r},${c+1}`);m.add(`${r},${c+2}`);
      if (c+3<BOARD_SIZE&&b[r][c]===b[r][c+3]) m.add(`${r},${c+3}`);
    }
  }
  for (let c=0;c<BOARD_SIZE;c++) for (let r=0;r<BOARD_SIZE-2;r++) {
    if (b[r][c]!==-1&&b[r][c]===b[r+1][c]&&b[r][c]===b[r+2][c]) {
      m.add(`${r},${c}`);m.add(`${r+1},${c}`);m.add(`${r+2},${c}`);
      if (r+3<BOARD_SIZE&&b[r][c]===b[r+3][c]) m.add(`${r+3},${c}`);
    }
  }
  return [...m].map(s => s.split(",").map(Number));
}

function applyGravity(b) {
  const n = b.map(r=>[...r]);
  for (let c=0;c<BOARD_SIZE;c++) {
    let w = BOARD_SIZE-1;
    for (let r=BOARD_SIZE-1;r>=0;r--) if(n[r][c]!==-1){n[w][c]=n[r][c];if(w!==r)n[r][c]=-1;w--;}
    for (let r=w;r>=0;r--) n[r][c]=rand();
  }
  return n;
}

function findHint(b) {
  for (let r=0;r<BOARD_SIZE;r++) for (let c=0;c<BOARD_SIZE;c++) {
    if (c+1<BOARD_SIZE){const t=b.map(r=>[...r]);[t[r][c],t[r][c+1]]=[t[r][c+1],t[r][c]];if(findMatches(t).length>0) return [[r,c],[r,c+1]];}
    if (r+1<BOARD_SIZE){const t=b.map(r=>[...r]);[t[r][c],t[r+1][c]]=[t[r+1][c],t[r][c]];if(findMatches(t).length>0) return [[r,c],[r+1,c]];}
  }
  return null;
}

function hasValidMoves(b) { return findHint(b) !== null; }
function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }

function genRival(ps) {
  const v=0.3+Math.random()*0.6, s=Math.round(ps*v+Math.random()*500);
  const c=[0,0,0,0,0], t=15+Math.floor(Math.random()*25);
  for(let i=0;i<t;i++)c[rand()]++;
  return {name:["영지","현수","미래","도윤","서연","준호","하은","지민"][Math.floor(Math.random()*8)],score:s,combo:1+Math.floor(Math.random()*6),counts:c};
}

function calcChem(a,b) {
  const at=a.reduce((x,y)=>x+y,0)||1, bt=b.reduce((x,y)=>x+y,0)||1;
  const ap=a.map(c=>c/at), bp=b.map(c=>c/bt);
  let comp=0; for(let i=0;i<5;i++)comp+=(1-Math.abs(ap[i]-bp[i]))*20;
  let syn=0; for(let i=0;i<5;i++){if(ap[i]>0.15&&bp[SYN_MAP[i]]>0.15)syn+=15;if(bp[i]>0.15&&ap[SYN_MAP[i]]>0.15)syn+=15;}
  return Math.max(15,Math.min(98,Math.round(comp*0.5+syn*0.5+Math.random()*10)));
}

function startTimer() {
  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    if (state.screen !== "playing") { clearInterval(timerId); timerId = null; return; }
    state.timeLeft--;

    if (state.timeLeft <= 0) {
      clearInterval(timerId); timerId = null;
      clearAllGT(); state.processing = false;
      if (state.mode === "bossRush") {
        state.screen = "bossDefeat";
      } else if (state.mode === "chemistry") {
        state.rival = genRival(state.score);
        state.chemScore = calcChem(state.elementCounts, state.rival.counts);
        state.chemRevealed = false;
        state.screen = "chemResult";
        if (state.soundOn) playChem();
      } else {
        state.screen = "result";
        saveToLeaderboard(state.score);
        updateStats(state.score, state.maxCombo);

function resetHintTimer() {
  state.hintCells = null;
  if (hintTimerId) clearTimeout(hintTimerId);

      const h = findHint(state.board);

    }
  }, (playerArchetype && playerArchetype.effect === "hintSpeed") ? HINT_DELAY/2 : HINT_DELAY);
}

function processMatches(board, chain) {
  if (state.screen !== "playing") { state.processing = false; return; }
  const ms = findMatches(board);
  if (ms.length === 0) {
    state.processing = false; comboChain = 0; lastMatchEl = -1;
    if (!hasValidMoves(board)) {
      state.shakeBoard = true; render();
      addGT(() => { if (state.screen !== "playing") return; state.shakeBoard = false; state.board = createBoard(); state.dropping = true; render(); }, 500);
    }
    render(); resetHintTimer(); return;
  }
  state.matchedCells = new Set(ms.map(([r,c])=>`${r},${c}`));
  const pEl = board[ms[0][0]][ms[0][1]];
  const syn = lastMatchEl >= 0 && SYN_MAP[lastMatchEl] === pEl;
  const nc = chain + 1;
  comboChain = nc; lastMatchEl = pEl;
  state.combo = nc; state.maxCombo = Math.max(state.maxCombo, nc); state.lastElement = pEl;
  if (state.soundOn) playMatch(pEl);
  if (syn) { state.synergyFlash = true; if (state.soundOn) playSynergy(); screenFlash("rgba(240,198,116,0.35)", 400); addGT(()=>{state.synergyFlash=false;render();},800); }
  if (nc >= 2) state.comboText = {text: nc>=5?"🔥 INCREDIBLE!":nc>=4?"⚡ AMAZING!":nc>=3?"✨ GREAT!":"💫 NICE!", id:Date.now()};
  if (nc >= 3) screenFlash(nc>=5?"rgba(239,68,68,0.5)":nc>=4?"rgba(201,168,76,0.5)":"rgba(124,91,240,0.4)", nc>=4?400:300);
  if (nc >= 4) showScorePop(`×${nc} COMBO!`, nc>=5?"#ef4444":"#f0c674");
  const boostMult = (state.boostActive && pEl === state.boostElement) ? 3 : 1;
  const zodiacMult = (playerZodiac && pEl === playerZodiac.element) ? 1.5 : 1;
  const comboMult = (playerArchetype && playerArchetype.effect === "comboBoost") ? 1.2 : 1;
  const synMult = (syn && playerArchetype && playerArchetype.effect === "synergyBoost") ? 3 : (syn ? 2 : 1);
  const weakMult = (state.mode === "bossRush" && pEl === state.bossWeakness) ? 2 : 1;
  const pts = Math.round(ms.length*10*(1+(nc-1)*0.5)*synMult*boostMult*zodiacMult*comboMult*weakMult);
  if (boostMult > 1) showToast(`${ELEMENTS[pEl].emoji} ×3 부스트!`);
  if (zodiacMult > 1 && boostMult === 1) showToast(`${playerZodiac.emoji} 띠 보너스!`);
  if (weakMult > 1) showToast(`💥 약점 공격! ×2!`);
  state.score += pts; state.totalMatches += ms.length;
  bossHit(pts);
  checkMilestone();
  ms.forEach(([r,c])=>{const e=board[r][c];if(e>=0&&e<5)state.elementCounts[e]++;});
  render();
  addGT(() => {
    if (state.screen !== "playing") return;
    ms.forEach(([r,c])=>{board[r][c]=-1;});
    state.board = applyGravity(board); state.matchedCells = new Set(); state.dropping = true; render();
    addGT(() => processMatches(state.board, nc), 200);
  }, 320);
}

function handleCell(r, c) {
  if (state.screen !== "playing" || state.processing) return;
  if (state.activeItem === "bomb") { useBomb(r,c); return; }
  if (state.activeItem === "rainbow") { useRainbow(r,c); return; }
  state.hintCells = null;
  if (!state.selected) { state.selected = [r,c]; render(); return; }
  const [sr,sc] = state.selected;
  if (sr===r&&sc===c) { state.selected = null; render(); return; }
  if (Math.abs(sr-r)+Math.abs(sc-c) !== 1) { state.selected = [r,c]; render(); return; }
  const nb = state.board.map(row=>[...row]);
  [nb[sr][sc],nb[r][c]] = [nb[r][c],nb[sr][sc]];
  if (findMatches(nb).length === 0) {
    state.selected = null; state.shakeBoard = true;
    if (state.soundOn) playFail(); render();
    addGT(()=>{state.shakeBoard=false;render();},300); return;
  }
  state.board = nb; state.selected = null; state.processing = true; state.moveCount++;
  comboChain = 0; lastMatchEl = -1;
  processMatches(nb, 0);
}

function useBomb(r,c) {
  if (state.items.bomb <= 0) return;
  state.items.bomb--; state.activeItem = null;
  if (state.soundOn) playItem();
  const nb = state.board.map(row=>[...row]);
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<BOARD_SIZE&&nc>=0&&nc<BOARD_SIZE)nb[nr][nc]=-1;}
  state.score += 45; state.board = applyGravity(nb); state.dropping = true; render();
  addGT(()=>{if(state.screen!=="playing")return;const ms=findMatches(state.board);if(ms.length>0){state.processing=true;comboChain=0;lastMatchEl=-1;processMatches(state.board,0);}},300);
}
function useClock() {
  if (state.items.clock <= 0) return;
  state.items.clock--; state.activeItem = null;
  if (state.soundOn) playItem();
  state.timeLeft = Math.min(state.timeLeft+10, 99);
  showToast("⏰ +10초!"); render();
}
function useRainbow(r,c) {
  if (state.items.rainbow <= 0) return;
  const targetEl = state.board[r][c]; state.items.rainbow--; state.activeItem = null;
  if (state.soundOn) playItem();
  const counts=[0,0,0,0,0];
  state.board.forEach(row=>row.forEach(cell=>{if(cell>=0&&cell<5)counts[cell]++;}));
  const most = counts.indexOf(Math.max(...counts));
  const nb = state.board.map(row=>[...row]);
  let changed=0;
  for(let rr=0;rr<BOARD_SIZE&&changed<4;rr++) for(let cc=0;cc<BOARD_SIZE&&changed<4;cc++){if(nb[rr][cc]===targetEl){nb[rr][cc]=most;changed++;}}
  state.board = nb; render();
  addGT(()=>{if(state.screen!=="playing")return;const ms=findMatches(state.board);if(ms.length>0){state.processing=true;comboChain=0;lastMatchEl=-1;processMatches(state.board,0);}},300);
}

        <div style="font-size:9px;color:#9ca3af;font-weight:700;margin-top:2px">총 플레이</div>
      </div>
      <div style="padding:12px;border-radius:12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);text-align:center">
        <div style="font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#3b82f6">${s.avgSession}<span style="font-size:10px;color:#6b7280">s</span></div>
        <div style="font-size:9px;color:#9ca3af;font-weight:700;margin-top:2px">평균 세션</div>
      </div>
      <div style="padding:12px;border-radius:12px;background:rgba(124,91,240,0.06);border:1px solid rgba(124,91,240,0.2);text-align:center">
        <div style="font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#7C5BF0">${s.dau}<span style="font-size:10px;color:#6b7280">일</span></div>
        <div style="font-size:9px;color:#9ca3af;font-weight:700;margin-top:2px">활성일수(30일)</div>
      </div>
    </div>

    <!-- ═══ 전환 퍼널 ═══ -->
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(124,91,240,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#7C5BF0;font-weight:800;margin-bottom:10px">🔄 전환 퍼널 (킬링 콘텐츠 지표)</div>
      ${fSteps.map((f,i)=>{
        const pct = fMax > 0 ? Math.round(f.val/fMax*100) : 0;
        const rate = i > 0 && fSteps[i-1].val > 0 ? Math.round(f.val/fSteps[i-1].val*100) : (i===0?100:0);
        return `<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:9px;color:#e5e7eb;font-weight:700">${f.label}</span>
            <span style="font-size:9px;font-weight:800"><span style="color:${f.color}">${f.val.toLocaleString()}</span>${i>0?` <span style="color:${rate>=50?'#22c55e':'#ef4444'};font-size:8px">(${rate}%)</span>`:''}</span>
          </div>
          <div style="height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${f.color};border-radius:3px;transition:width 0.5s"></div>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:6px;padding:6px 8px;border-radius:6px;background:rgba(124,91,240,0.08);font-size:9px;color:#c9a84c;font-weight:700;text-align:center">
        🎯 게임→N-KAI 전환율: <span style="color:#7C5BF0;font-size:11px;font-weight:900">${s.funnelRates.playToNKAI}%</span>
      </div>
    </div>

    <!-- ═══ 화면별 조회수 ═══ -->
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#c9a84c;font-weight:800;margin-bottom:10px">📱 화면별 조회 & 체류시간</div>
      ${s.screenRank.filter(r=>r.name!=='analytics').map(r=>{
        const pct = Math.round(r.views/maxViews*100);
        const color = screenColors[r.name]||'#6b7280';
        const label = screenLabels[r.name]||r.name;
        return `<div style="margin-bottom:5px">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:9px;color:#e5e7eb">${label}</span>
            <span style="font-size:8px;color:#9ca3af"><span style="color:${color};font-weight:800">${r.views}</span>회 · 평균 <span style="font-weight:700">${r.avgSec}s</span></span>
          </div>
          <div style="height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- ═══ 게임 모드 분포 ═══ -->
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(34,197,94,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#22c55e;font-weight:800;margin-bottom:10px">🎮 게임 모드 인기도</div>
      <div style="display:flex;gap:4px;height:20px;border-radius:6px;overflow:hidden;margin-bottom:8px">
        ${Object.entries(s.modes).map(([k,v])=>v>0?`<div style="flex:${v};background:${modeColors[k]||'#6b7280'};height:100%" title="${k}: ${v}"></div>`:'').join('')}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${Object.entries(s.modes).map(([k,v])=>`<div style="display:flex;align-items:center;gap:3px">
          <div style="width:8px;height:8px;border-radius:2px;background:${modeColors[k]||'#6b7280'}"></div>
          <span style="font-size:9px;color:#9ca3af">${modeLabels[k]||k} <span style="color:#fff;font-weight:700">${v}</span> (${Math.round(v/totalModes*100)}%)</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- ═══ 클릭 랭킹 TOP 10 ═══ -->
    ${topClicks.length > 0 ? `
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#ef4444;font-weight:800;margin-bottom:10px">🔥 클릭 랭킹 TOP ${topClicks.length}</div>
      ${topClicks.map((c,i)=>{
        const pct = Math.round(c.count/maxClicks*100);
        const label = clickLabels[c.name] || c.name;
        return `<div style="margin-bottom:4px">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:9px;color:#e5e7eb">${i+1}. ${label}</span>
            <span style="font-size:9px;color:#ef4444;font-weight:800">${c.count}</span>
          </div>
          <div style="height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:2px"></div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- ═══ 기능 사용 현황 ═══ -->
    ${featureItems.length > 0 ? `
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(45,140,255,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#2D8CFF;font-weight:800;margin-bottom:10px">⚙️ 기능 사용 현황</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${featureItems.map(f=>`<div style="padding:8px;border-radius:8px;background:rgba(45,140,255,0.05);border:1px solid rgba(45,140,255,0.1);text-align:center">
          <div style="font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#2D8CFF">${f.val}</div>
          <div style="font-size:8px;color:#9ca3af;margin-top:2px">${f.label}</div>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- ═══ 피크 시간대 ═══ -->
    ${hours.length > 0 ? `
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#c9a84c;font-weight:800;margin-bottom:10px">⏰ 시간대별 접속 ${s.peakHour?`(피크: ${s.peakHour[0]}시)`:''}</div>
      <div style="display:flex;align-items:flex-end;gap:2px;height:50px">
        ${Array.from({length:24},(_,h)=>{
          const val = s.peakHours[h]||0;
          const pct = maxHour > 0 ? Math.round(val/maxHour*100) : 0;
          const isPeak = s.peakHour && parseInt(s.peakHour[0])===h;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
            <div style="width:100%;height:${Math.max(pct,2)}%;background:${isPeak?'#c9a84c':val>0?'rgba(201,168,76,0.4)':'rgba(255,255,255,0.04)'};border-radius:2px 2px 0 0;min-height:2px"></div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:2px">
        <span style="font-size:7px;color:#6b7280">0시</span>
        <span style="font-size:7px;color:#6b7280">6시</span>
        <span style="font-size:7px;color:#6b7280">12시</span>
        <span style="font-size:7px;color:#6b7280">18시</span>
        <span style="font-size:7px;color:#6b7280">24시</span>
      </div>
    </div>` : ''}

    <!-- ═══ 일별 리텐션 ═══ -->
    ${retDays.length > 0 ? `
    <div style="${W};background:rgba(255,255,255,0.015);border:1px solid rgba(34,197,94,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;color:#22c55e;font-weight:800;margin-bottom:10px">📅 일별 방문 & 플레이 (최근 7일)</div>
      ${retDays.map(([date, r])=>{
        const d = new Date(date);
        const dayLabel = ['일','월','화','수','목','금','토'][d.getDay()];
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-size:8px;color:#6b7280;width:50px">${date.slice(5)} ${dayLabel}</span>
          <div style="flex:1;display:flex;gap:3px;align-items:center">
            <span style="font-size:8px;color:#22c55e;width:40px">방문 ${r.visits}</span>
            <div style="flex:1;height:4px;background:rgba(34,197,94,0.1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min(r.visits*20,100)}%;background:#22c55e;border-radius:2px"></div></div>
          </div>
          <div style="flex:1;display:flex;gap:3px;align-items:center">
            <span style="font-size:8px;color:#3b82f6;width:40px">플레이 ${r.plays}</span>
            <div style="flex:1;height:4px;background:rgba(59,130,246,0.1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min(r.plays*10,100)}%;background:#3b82f6;border-radius:2px"></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- ═══ 데이터 내보내기 ═══ -->
    <div style="${W};display:flex;gap:8px;margin-bottom:14px">
      <button onclick="copyAnalyticsJSON()" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.06);color:#c9a84c;font-size:10px;font-weight:700;font-family:inherit">📋 JSON 복사</button>
      <button onclick="copyAnalyticsReport()" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(124,91,240,0.3);background:rgba(124,91,240,0.06);color:#7C5BF0;font-size:10px;font-weight:700;font-family:inherit">📊 리포트 복사</button>
    </div>

    <div style="font-size:8px;color:#374151;margin-bottom:10px">첫 방문: ${new Date(s.firstVisit).toLocaleDateString('ko')}</div>
  </div>`;
}

function copyAnalyticsJSON() {
  const data = JSON.stringify(KBAnalytics.getSummary(), null, 2);
  navigator.clipboard?.writeText(data).then(()=>showToast('📋 JSON 복사 완료!'));
}
function copyAnalyticsReport() {
  const s = KBAnalytics.getSummary();
  const lines = [
    '═══ KaiBoom Analytics Report ═══',
    `📅 기간: ${new Date(s.firstVisit).toLocaleDateString('ko')} ~ ${new Date().toLocaleDateString('ko')}`,
    '',
    '▶ 핵심 KPI',
    `  총 세션: ${s.totalSessions} | 총 플레이: ${s.totalPlays} | 평균 세션: ${s.avgSession}초 | 활성일: ${s.dau}일`,
    '',
    '▶ 전환 퍼널',
    `  메뉴 진입 → 게임 시작: ${s.conversions.menuToPlay}`,
    `  게임 시작 → 결과 도달: ${s.conversions.playToResult}`,
    `  결과 → N-KAI 클릭: ${s.conversions.resultToNKAI}`,
    `  ★ 게임→N-KAI 전환율: ${s.funnelRates.playToNKAI}%`,
    '',
    '▶ 게임 모드 분포',
    ...Object.entries(s.modes).map(([k,v])=>`  ${k}: ${v}회`),
    '',
    '▶ 기능 사용',
    ...Object.entries(s.features).filter(([k,v])=>v>0).map(([k,v])=>`  ${k}: ${v}회`),
    '',
    '▶ 피크 시간대: ' + (s.peakHour ? s.peakHour[0]+'시 ('+s.peakHour[1]+'회)' : 'N/A'),
    '',
    '© Neurin Kairos AI · KaiBoom Analytics',
  ];
  navigator.clipboard?.writeText(lines.join('\n')).then(()=>showToast('📊 리포트 복사 완료!'));
}

// Init
startRechargeTimer();
render();

// ═══ Global CTA Click Tracker ═══
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[href*="utm_source=kaiboom"]');
  if (a) {
    const url = new URL(a.href, location.origin);
    const medium = url.searchParams.get('utm_medium') || 'unknown';
    KBAnalytics.click('cta_nkai_' + medium);
    KBAnalytics.feature('nkaiCTA');
    KBAnalytics.conversion('resultToNKAI');
  }
});

// Track zodiac setting
const _origShowBirthday = showBirthdayPrompt;
// Wrap showBirthdayPrompt isn't easily done, so we track in setBirthday inline

// Show attendance popup on first visit today
setTimeout(()=>{
  if (streak > 0) showAttendancePopup();
  else if (state.showBirthdayPrompt) setTimeout(showBirthdayPrompt, 800);
}, 500);
window.addEventListener("resize", () => { if (state.screen === "playing") render(); });

// ═══ Mobile touch scroll prevention ═══
// Prevent pull-to-refresh and bounce scroll on mobile during gameplay
document.addEventListener('touchmove', function(e) {
  // Allow scroll on result screens (they can be long), block during playing
  if (state.screen === 'playing') {
    e.preventDefault();
  }
}, { passive: false });

// Prevent iOS overscroll bounce
document.body.addEventListener('touchmove', function(e) {
  if (state.screen === 'playing') {
    e.preventDefault();
  }
}, { passive: false });
</script>
</body>
</html>
